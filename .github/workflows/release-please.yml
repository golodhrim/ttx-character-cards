on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

name: release

jobs:
    upload-build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22.x"
            - name: Build
              run: |
                  npm ci
                  npm run build --if-present
                  mkdir ttx-character-cards
                  cp main.js manifest.json styles.css ttx-character-cards
                  zip -r ttx-character-cards.zip ttx-character-cards
            - name: Create release and upload assets
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG_NAME: ${{ github.ref_name }}
              run: |
                  gh release create "$TAG_NAME" \
                    main.js \
                    manifest.json \
                    styles.css \
                    ttx-character-cards.zip \
                    --repo "$GITHUB_REPOSITORY" \
                    --title "$TAG_NAME" \
                    --generate-notes
